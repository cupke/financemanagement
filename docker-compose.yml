# FinTrack — единый запуск инфраструктуры в режиме разработки.
# Поднимает backend (FastAPI) и БД (PostgreSQL) одной командой.
# Frontend (React) пока запускается на хосте; будет добавлен сюда отдельным шагом.
#
# Запуск:               docker compose up -d
# Сборка после правок:  docker compose up -d --build
# Логи backend (live):  docker compose logs -f backend
# Остановка:            docker compose down
# Полная очистка БД:    docker compose down -v   (удалит volume вместе с данными)
#
# Alembic-миграции:
#   docker compose run --rm backend alembic revision --autogenerate -m "описание"
#   docker compose run --rm backend alembic upgrade head

services:
  db:
    image: postgres:15-alpine
    container_name: fintrack-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: fintrack
      POSTGRES_PASSWORD: fintrack_dev_password
      POSTGRES_DB: fintrack
    ports:
      # Экспонируем 55432 на хосте — для подключения внешних инструментов
      # (DBeaver, pgAdmin). Backend внутри compose обращается по имени сервиса db:5432.
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fintrack -d fintrack"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Mailhog — «фейковый» SMTP-сервер для разработки. Ловит все исходящие письма
  # (подтверждение почты, сброс пароля) и показывает их в веб-интерфейсе,
  # реально никуда не отправляя. Открыть письма: http://127.0.0.1:8025
  #
  # Сервис ОПЦИОНАЛЬНЫЙ (Docker-профиль "mail"): обычный `docker compose up -d`
  # его НЕ поднимает. Чтобы поднять Mailhog: `docker compose --profile mail up -d`
  # (и тогда работает дефолт SMTP_HOST=mailhog). Альтернативы без Mailhog:
  #  - реальный SMTP — прописать SMTP_* в backend/.env;
  #  - режим лога — EMAIL_LOG_ONLY=true (письма печатаются в лог backend).
  mailhog:
    image: mailhog/mailhog:latest
    container_name: fintrack-mailhog
    restart: unless-stopped
    profiles: ["mail"]
    ports:
      - "8025:8025"  # веб-интерфейс (просмотр писем)
      - "1025:1025"  # SMTP (backend шлёт сюда)

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fintrack-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Внутри docker-network backend обращается к БД по имени сервиса db.
      # Перебивает значение из backend/.env (env vars имеют приоритет в pydantic-settings).
      DATABASE_URL: postgresql+asyncpg://fintrack:fintrack_dev_password@db:5432/fintrack
      ENVIRONMENT: dev
      # SMTP здесь НЕ задаём, чтобы настройки из backend/.env имели приоритет
      # (env-переменные compose перебивают .env). По умолчанию (config.py)
      # SMTP_HOST=mailhog — работает при `docker compose --profile mail up -d`.
      # Реальный SMTP / режим лога настраиваются через backend/.env.
      # URL фронтенда для ссылок в письмах — адрес, который открывает браузер.
      FRONTEND_BASE_URL: http://127.0.0.1:60001
      # Чтобы логи python печатались в реальном времени, без буферизации.
      PYTHONUNBUFFERED: "1"
    ports:
      # Хост 60000 → контейнер 8000. /health доступен на http://localhost:60000/health
      - "60000:8000"
    volumes:
      # Код хоста монтируется в /app — изменения подхватываются hot-reload-ом.
      - ./backend:/app
      # Анонимный volume для /app/.venv: предотвращает «утечку» Windows-binarнок .venv
      # хоста внутрь Linux-контейнера. Внутри контейнера зависимости установлены
      # в системный site-packages, .venv не нужен.
      - /app/.venv

volumes:
  postgres_data:
